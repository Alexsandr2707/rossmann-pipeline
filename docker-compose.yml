x-pipeline-service: &pipeline-service
  build:
    context: .
    dockerfile: Dockerfile
  image: rossmann-ml-pipeline:local
  working_dir: /app
  user: "${UID:-1000}:${GID:-1000}"
  volumes:
    - ./data:/app/data
    - ./models:/app/models
    - ./artifacts:/app/artifacts
    - ./reports:/app/reports
    - ./logs:/app/logs

services:
  ci:
    <<: *pipeline-service
    entrypoint: ["python", "-m", "unittest"]
    command: ["discover", "-s", "tests", "-v"]

  pipeline:
    <<: *pipeline-service
    command: ["-mode", "summary"]

  train:
    <<: *pipeline-service
    command: ["-mode", "pretrain"]

  pretrain:
    <<: *pipeline-service
    command: ["-mode", "pretrain"]

  update:
    <<: *pipeline-service
    command: ["-mode", "update"]

  evaluate:
    <<: *pipeline-service
    command: ["-mode", "evaluate"]

  inference:
    <<: *pipeline-service
    command: ["-mode", "inference", "-file", "data/external/test.csv"]

  reset:
    <<: *pipeline-service
    command: ["-mode", "reset"]

  summary:
    <<: *pipeline-service
    command: ["-mode", "summary"]

  local-cd:
    <<: *pipeline-service
    entrypoint: ["sh", "-c"]
    command:
      - >-
        python -m unittest discover -s tests -v
        && python run.py -mode reset
        && python run.py -mode pretrain
        && python run.py -mode summary
