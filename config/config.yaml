project:
  name: rossmann_sales_forecasting
  random_seed: 42

data:
  source_paths:
    - data/external/train.csv
  store_path: data/external/store.csv
  time_column: Date
  target_column: Sales
  min_rows: 10000
  min_features: 10
  min_categorical_features: 2

target_preprocessing:
  missing_strategy: drop
  missing_fill_value: 0.0
  add_missing_indicator: false
  missing_indicator_suffix: _WAS_MISSING

data_schema:
  numeric_columns:
    - DayOfWeek
    - Open
    - Promo
    - SchoolHoliday
    - CompetitionDistance
    - CompetitionOpenSinceMonth
    - CompetitionOpenSinceYear
    - Promo2
    - Promo2SinceWeek
    - Promo2SinceYear
  categorical_columns:
    - Store
    - StateHoliday
    - StoreType
    - Assortment
    - PromoInterval
  datetime_columns:
    - Date
  id_columns:
    - Id
  service_columns:
    - Customers
    - _source_file

paths:
  external_data_dir: data/external
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  artifacts_dir: artifacts
  models_dir: models
  logs_dir: logs
  reports_dir: reports
  predictions_dir: artifacts/predictions
  collector_state_path: artifacts/collector_state.json
  batch_metadata_path: artifacts/batch_metadata_history.csv
  model_metrics_history_path: artifacts/model_metrics_history.csv
  best_model_path: models/best_model.pkl
  pipeline_log_path: logs/pipeline.log

model:
  primary_metric: rmse
  training_mode: single
  selected_model: decision_tree_regression
  update_strategy: full_refit
  stream_batch_days: 7
  initial_train_ratio: 0.50
  validation_ratio: 0.20
  stream_ratio: 0.30
  rolling_train_period_days: 365
  pretrain_mark_collector_state: true
  candidate_models:
    - decision_tree_regression
    - knn_regression
    - ridge_regression
    - sgd_regression

model_parameters:
  decision_tree_regression:
    min_samples_leaf: 20
  knn_regression:
    n_neighbors: 8
    weights: distance
  ridge_regression:
    alpha: 1.0
  sgd_regression:
    loss: squared_error
    penalty: l2
    alpha: 0.0001
    max_iter: 1000
    tol: 0.001
