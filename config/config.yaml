project:
  name: mlops_streaming_mvp
  random_seed: 42

data:
  source_paths:
    - data/external/motor_data11-14lats.csv
    - data/external/motor_data14-2018.csv
  time_column: INSR_BEGIN
  target_column: CLAIM_PAID
  batch_size: 5000
  min_rows: 10000
  min_features: 10
  min_categorical_features: 2

target_preprocessing:
  missing_strategy: fill_zero
  missing_fill_value: 0.0
  add_missing_indicator: true
  missing_indicator_suffix: _WAS_MISSING

data_schema:
  numeric_columns:
    - INSURED_VALUE
    - PREMIUM
    - PROD_YEAR
    - SEATS_NUM
    - CARRYING_CAPACITY
    - CCM_TON
  categorical_columns:
    - SEX
    - EFFECTIVE_YR
    - INSR_TYPE
    - TYPE_VEHICLE
    - MAKE
    - USAGE
  datetime_columns:
    - INSR_BEGIN
    - INSR_END
  id_columns:
    - OBJECT_ID
  service_columns:
    - _source_file

paths:
  external_data_dir: data/external
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  artifacts_dir: artifacts
  models_dir: models
  logs_dir: logs
  reports_dir: reports
  predictions_dir: artifacts/predictions
  collector_state_path: artifacts/collector_state.json
  batch_metadata_path: artifacts/batch_metadata_history.csv
  data_quality_history_path: artifacts/data_quality_history.csv
  model_metrics_history_path: artifacts/model_metrics_history.csv
  best_model_path: models/best_model.pkl
  pipeline_log_path: logs/pipeline.log

quality:
  max_missing_part: 0.5
  max_duplicate_part: 0.1
  
model:
  primary_metric: rmse
  incremental_model: sgd_regression
  candidate_models:
    - linear_regression
    - elastic_net_regression
    - knn_regression
    - decision_tree_regression
    - random_forest_regression
    - sgd_regression

model_parameters:
  linear_regression:
    fit_intercept: true
  elastic_net_regression:
    alpha: 1.0
    l1_ratio: 0.5
    max_iter: 5000
  knn_regression:
    n_neighbors: 5
    weights: uniform
  decision_tree_regression:
    min_samples_leaf: 1
  random_forest_regression:
    n_estimators: 50
    min_samples_leaf: 1
    n_jobs: -1
  sgd_regression:
    alpha: 0.0001
    max_iter: 2000
    tol: 0.001
